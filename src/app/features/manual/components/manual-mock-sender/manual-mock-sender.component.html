<section class="page-card">
  <div class="page-copy">
    <p class="page-label">Sender mode (manual)</p>
    <h2>Mock controls</h2>
    <p class="hint">Move sliders to send synthetic angles to receiver.</p>
  </div>

  <label>
    <span>Pitch: {{ pitch() | number: '1.1-1' }}°</span>
    <input
      type="range"
        [min]="-pitchMax"
        [max]="pitchMax"
      step="0.1"
      [value]="pitch()"
      (input)="onPitchInput($event)"
    />
      @if (pitchOverLimit()) {
        <span class="over-limit">⚠️ Exceeds max {{ maxPitchDeg }}° — airbags cannot compensate</span>
      }
  </label>

  <label>
    <span>Roll: {{ roll() | number: '1.1-1' }}°</span>
    <input
      type="range"
        [min]="-rollMax"
        [max]="rollMax"
      step="0.1"
      [value]="roll()"
      (input)="onRollInput($event)"
    />
      @if (rollOverLimit()) {
        <span class="over-limit">⚠️ Exceeds max {{ maxRollDeg }}° — airbags cannot compensate</span>
      }
  </label>

    @if (overLimit()) {
      <p class="limit-banner">🔴 Tilt exceeds airbag capacity (max {{ maxPitchDeg }}° pitch / {{ maxRollDeg }}° roll). Showing partial correction.</p>
    }

  <div class="actions">
    <button type="button" (click)="reset()">Reset to 0°</button>
  </div>


</section>
