<section class="page-card">
  <div class="page-copy">
    <p class="page-label">Sender mode (offline)</p>
    <h3>Real sensor controls</h3>
    <p class="hint">Use real sensor and sync locally to receiver.</p>
  </div>

  <div class="actions">
    <button
      class="primary-button"
      (click)="startSensor()"
      [disabled]="isTracking() || isRequestingPermission() || !isSupported"
    >
      {{ isRequestingPermission() ? 'Requesting motion access...' : isTracking() ? 'Sensor running' : 'Start sensor' }}
    </button>
    @if (isTracking()) {
      <button class="danger-button" (click)="stopSensor()">Stop</button>
    }
  </div>

  @if (errorMessage(); as err) {
    <p class="error">{{ err }}</p>
  }

  <div class="metrics" aria-live="polite">
    <article>
      <span>Pitch</span>
      <strong>{{ pitch() | number: '1.1-1' }}°</strong>
    </article>
    <article>
      <span>Roll</span>
      <strong>{{ roll() | number: '1.1-1' }}°</strong>
    </article>
  </div>
</section>
