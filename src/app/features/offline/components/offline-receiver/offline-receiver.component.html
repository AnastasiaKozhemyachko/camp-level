<section class="offline-receiver">
  <app-receiver-header
    [statusMessage]="state.statusMessage()"
    [errorMessage]="state.errorMessage()"
    [updatedAt]="state.updatedAt()"
  ></app-receiver-header>

  <app-receiver-visualizer
    [wheelHeights]="state.wheelHeights()"
    [levelStatus]="state.levelStatus()"
  ></app-receiver-visualizer>
</section>
