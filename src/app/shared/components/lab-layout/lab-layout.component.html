<section class="lab-shell">
  <header class="lab-header">
    <h1>{{ title() }}</h1>
    @if (subtitle()) {
      <p>{{ subtitle() }}</p>
    }
  </header>

  <div class="lab-grid">
    <article class="lab-column">
      <h2>{{ leftTitle() }}</h2>
      <ng-content select="[left-panel]"></ng-content>
    </article>

    <article class="lab-column">
      <h2>Receiver</h2>
      <ng-content select="[right-panel]"></ng-content>
    </article>
  </div>
</section>
