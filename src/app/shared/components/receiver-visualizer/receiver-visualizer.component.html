<div [ngClass]="getSeverityClass()" class="camper-visualizer">
  <div class="camper-container">
    <div class="car-wrapper">
      <img class="car-image" src="assets/car.webp" alt="Car top view" />
      <div class="wheel-marker wheel-marker--front-left" [class.active]="isWheelToLift('Front Left')" [ngClass]="'wheel-marker--' + levelStatus().severity"></div>
      <div class="wheel-marker wheel-marker--front-right" [class.active]="isWheelToLift('Front Right')" [ngClass]="'wheel-marker--' + levelStatus().severity"></div>
      <div class="wheel-marker wheel-marker--rear-left" [class.active]="isWheelToLift('Rear Left')" [ngClass]="'wheel-marker--' + levelStatus().severity"></div>
      <div class="wheel-marker wheel-marker--rear-right" [class.active]="isWheelToLift('Rear Right')" [ngClass]="'wheel-marker--' + levelStatus().severity"></div>
    </div>
  </div>

  <div class="wheels-info" aria-live="polite">
    @for (wheel of wheelHeights(); track wheel.label) {
      <div class="wheel-item" [class.to-lift]="isWheelToLift(wheel.label)">
        <span class="wheel-label">{{ wheel.label }}</span>
        <span class="wheel-lift" [class.positive]="isWheelToLift(wheel.label)">
          <span class="wheel-lift-value wheel-lift-value--cm">
            {{ isWheelToLift(wheel.label) ? ('↑ ' + wheel.liftCm.toFixed(1) + ' cm') : '—' }}
          </span>
          <span class="wheel-lift-value wheel-lift-value--deg">
            {{ (wheel.tiltDeg >= 0 ? '↑ ' : '↓ ') + (wheel.tiltDeg >= 0 ? wheel.tiltDeg : -wheel.tiltDeg).toFixed(1) + '°' }}
          </span>
        </span>
      </div>
    }
  </div>
</div>

<p class="instruction">{{ getInstructionText() }}</p>
