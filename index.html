<!DOCTYPE html>
<html>
<head>
  <title>Camp Level</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial; text-align: center; padding: 20px;">
<h1 id="status">Loading...</h1>
<button id="startBtn" style="display:none; font-size: 18px; padding: 12px 20px;">
  Start sensor
</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAmHErptxxJ3Eop2TGENx_KFPuSdFjKPs8",
    authDomain: "camp-level.firebaseapp.com",
    projectId: "camp-level",
    storageBucket: "camp-level.firebasestorage.app",
    messagingSenderId: "821228915473",
    appId: "1:821228915473:web:29cf9b5b07986aebc6dab0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const isSender = location.hash === "#sender";
  const statusEl = document.getElementById("status");
  const startBtn = document.getElementById("startBtn");

  if (isSender) {
    statusEl.innerText = "Sender mode";
    startBtn.style.display = "inline-block";

    startBtn.addEventListener("click", async () => {
      try {
        if (
            typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== "granted") {
            statusEl.innerText = "Motion access denied";
            return;
          }
        }

        statusEl.innerText = "Sending data...";
        startBtn.style.display = "none";

        window.addEventListener("deviceorientation", async (event) => {
          const pitch = event.beta;
          const roll = event.gamma;

          statusEl.innerText = `Sending...\nPitch: ${pitch?.toFixed?.(1)} Roll: ${roll?.toFixed?.(1)}`;

          await setDoc(doc(db, "level", "current"), {
            pitch,
            roll,
            updatedAt: Date.now()
          });
        });
      } catch (error) {
        statusEl.innerText = "Error: " + error.message;
      }
    });
  } else {
    statusEl.innerText = "Receiver mode: waiting for data...";

    onSnapshot(doc(db, "level", "current"), (docSnap) => {
      const data = docSnap.data();
      if (!data) {
        statusEl.innerText = "No data yet";
        return;
      }

      const pitch = data.pitch;
      const roll = data.roll;

      statusEl.innerText =
          `Pitch: ${pitch?.toFixed?.(1)}\nRoll: ${roll?.toFixed?.(1)}`;
    }, (error) => {
      statusEl.innerText = "Read error: " + error.message;
    });
  }
</script>
</body>
</html>
