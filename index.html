<!DOCTYPE html>
<html>
<head>
  <title>Camp Level</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial; text-align: center; padding: 20px;">
<h1 id="status">Loading...</h1>
<button id="startBtn" style="display:none; font-size: 18px; padding: 12px 20px;">
  Start sensor
</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAmHErptxxJ3Eop2TGENx_KFPuSdFjKPs8",
    authDomain: "camp-level.firebaseapp.com",
    projectId: "camp-level",
    storageBucket: "camp-level.firebasestorage.app",
    messagingSenderId: "821228915473",
    appId: "1:821228915473:web:29cf9b5b07986aebc6dab0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const isSender = location.hash === "#sender";
  const statusEl = document.getElementById("status");
  const startBtn = document.getElementById("startBtn");

  if (isSender) {
    statusEl.innerText = "Sender mode";
    startBtn.style.display = "inline-block";

    let currentPitch = 0;
    let currentRoll = 0;
    let lastSentPitch = null;
    let lastSentRoll = null;

    startBtn.addEventListener("click", async () => {
      try {
        if (
            typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== "granted") {
            statusEl.innerText = "Motion access denied";
            return;
          }
        }

        statusEl.innerText = "Tracking...";
        startBtn.style.display = "none";

        window.addEventListener("deviceorientation", (event) => {
          currentPitch = event.beta ?? 0;
          currentRoll = event.gamma ?? 0;

          statusEl.innerText =
              `Tracking...
Pitch: ${currentPitch.toFixed(1)}
Roll: ${currentRoll.toFixed(1)}`;
        });

        setInterval(async () => {
          const shouldSend =
              lastSentPitch === null ||
              Math.abs(currentPitch - lastSentPitch) > 0.3 ||
              Math.abs(currentRoll - lastSentRoll) > 0.3;

          if (!shouldSend) {
            console.log("Skipped (no significant change)");
            return;
          }

          try {
            await setDoc(doc(db, "level", "current"), {
              pitch: currentPitch,
              roll: currentRoll,
              updatedAt: Date.now()
            });

            lastSentPitch = currentPitch;
            lastSentRoll = currentRoll;

            console.log("Sent to Firebase");
          } catch (error) {
            console.error(error);
            statusEl.innerText += `\nWrite error: ${error.message}`;
          }
        }, 3000);

      } catch (error) {
        statusEl.innerText = "Error: " + error.message;
      }
    });
  } else {
    statusEl.innerText = "Receiver mode: waiting for data...";

    onSnapshot(
        doc(db, "level", "current"),
        (docSnap) => {
          const data = docSnap.data();

          if (!data) {
            statusEl.innerText = "No data yet";
            return;
          }

          const pitch = data.pitch ?? 0;
          const roll = data.roll ?? 0;

          statusEl.innerText =
              `Pitch: ${pitch.toFixed(1)}
Roll: ${roll.toFixed(1)}`;
        },
        (error) => {
          statusEl.innerText = "Read error: " + error.message;
        }
    );
  }
</script>
</body>
</html>
